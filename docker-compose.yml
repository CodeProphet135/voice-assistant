services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: va
      POSTGRES_PASSWORD: va
      POSTGRES_DB: voice_assistant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U va -d voice_assistant"]
      interval: 5s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.60
    profiles: ["observability"]
    ports:
      - "16686:16686" # UI
      - "4318:4318" # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  app:
    build: .
    profiles: ["app"]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://va:va@postgres:5432/voice_assistant

volumes:
  pgdata:
